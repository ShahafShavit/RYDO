services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
    ports:
      - "1433:1433"
    volumes:
      - rydo-sqldata:/var/opt/mssql
    # Wait until SQL Server accepts logins before starting the API (avoids "cannot open database Rydo" / recovery races).
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Your_password123 -C -Q 'SELECT 1' -b -o /dev/null || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 45s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Loaded from a `.env` file next to this compose file (not client/.env.local).
        VITE_MAPBOX_ACCESS_TOKEN: ${VITE_MAPBOX_ACCESS_TOKEN:-}
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=db;Database=Rydo;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=False;Connect Timeout=60"
      Jwt__Key: "rydo-dev-secret-key-min-32-chars-long!!"
      Jwt__Issuer: "rydo"
      Jwt__Audience: "rydo-client"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  rydo-sqldata:

<!doctype html>
<html lang="en" data-theme="midnight">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Plan rides, discover routes, and ride with your club — RYDO is built for riders on real trails."
    />
    <title>RYDO - Built for riders. Made for real trails.</title>

    <meta property="og:title" content="RYDO - Built for riders. Made for real trails." />
    <meta
      property="og:description"
      content="Plan rides, discover routes, and ride with your club — built for riders on real trails."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RYDO" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="%SITE_ORIGIN%/" />
    <meta property="og:image" content="%SITE_ORIGIN%/images/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RYDO - Built for riders. Made for real trails." />
    <meta
      name="twitter:description"
      content="Plan rides, discover routes, and ride with your club — built for riders on real trails."
    />
    <meta name="twitter:image" content="%SITE_ORIGIN%/images/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var key = 'rydo-color-scheme';
        var allowed = { midnight: 1, evergreen: 1, abyss: 1, daylight: 1, sage: 1, dune: 1 };
        try {
          var v = localStorage.getItem(key);
          if (v && allowed[v]) document.documentElement.setAttribute('data-theme', v);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'midnight');
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
